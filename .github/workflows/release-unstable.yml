name: Release (Unstable)

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  unstable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tests
        run: make test-slow

      - name: Build
        run: make build

      - name: Smoke test
        run: scripts/smoke-test.sh

      - name: Coverage badge
        id: badge
        run: scripts/coverage-badge.sh /tmp/coverage.json >> "$GITHUB_OUTPUT"

      - name: Determine unstable version
        id: version
        run: echo "version=$(scripts/unstable-version.sh)" >> "$GITHUB_OUTPUT"

      - name: Tag unstable build
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Move unstable tag
        run: |
          git tag -f unstable
          git push origin -f unstable

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          prerelease: true
          body: |
            ## ${{ steps.version.outputs.version }}

            Unstable build from `master`.
          make_latest: false

      - name: Push coverage badge to master-badges
        run: scripts/push-badges.sh /tmp/coverage.json
